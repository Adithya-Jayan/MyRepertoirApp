name: Manual Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'
          cache: true

      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app_fdroid/android/my-release-key.jks

      - name: Create key.properties
        run: |
          mkdir -p app_fdroid/android
          echo "storeFile=../my-release-key.jks" > app_fdroid/android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app_fdroid/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app_fdroid/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app_fdroid/android/key.properties

      - name: Build All Platforms
        run: |
          cd app_fdroid
          # Use a placeholder build name/number since we aren't calculating/bumping it
          BUILD_NAME="0.0.0-test"
          BUILD_NUMBER="${{ github.run_number }}"
          
          # --- Build Universal APK ---
          echo "Building Universal APK"
          flutter build apk --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

          # Build App Bundle
          echo "Building App Bundle"
          flutter build appbundle --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          
          # Build Web
          echo "Building Web"
          flutter build web --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          cd ..

      - name: Create Release Assets
        run: |
          mkdir -p release_assets
          cp app_fdroid/build/app/outputs/flutter-apk/app-release.apk release_assets/app-universal-fdroid-release.apk
          cp app_fdroid/build/app/outputs/bundle/release/app-release.aab release_assets/app-fdroid-release.aab
          cp -r app_fdroid/build/web release_assets/web_build
          
          cd release_assets
          zip -r web_build.zip web_build/
          cd ..

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-universal-fdroid-release
          path: release_assets/app-universal-fdroid-release.apk
          retention-days: 5

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-fdroid-release-bundle
          path: release_assets/app-fdroid-release.aab
          retention-days: 5

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: release_assets/web_build.zip
          retention-days: 5