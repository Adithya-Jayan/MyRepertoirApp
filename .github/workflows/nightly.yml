name: Nightly Build

on:
  schedule:
    - cron: '30 16 * * *' # 16:30 UTC daily (10:00 PM IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine last nightly reference
        id: last
        run: |
          git fetch --tags --force
          LAST_NIGHTLY_TAG=$(git tag --list 'nightly-*' --sort=-creatordate | head -n1)
          echo "last_tag=$LAST_NIGHTLY_TAG" >> $GITHUB_OUTPUT

      - name: Check if changes since last nightly
        id: changes
        run: |
          set -e
          DEFAULT_BRANCH="main"
          if [ -z "${{ steps.last.outputs.last_tag }}" ]; then
            echo "no_last=true" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            RANGE="${{ steps.last.outputs.last_tag }}..origin/$DEFAULT_BRANCH"
            if git rev-list --count "$RANGE" | grep -q '^[1-9]'; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Skip/fail run if no changes (scheduled runs only)
        if: steps.changes.outputs.has_changes == 'false' && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "No changes since last nightly. Checking previous nightly run status..."
          # Fetch the last completed run for this workflow on main
          LAST_CONCLUSION=$(gh run list \
            --workflow nightly.yml \
            --branch main \
            --status completed \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion')
          echo "Last nightly conclusion: ${LAST_CONCLUSION:-unknown}"
          if [ "$LAST_CONCLUSION" = "failure" ]; then
            echo "Previous nightly failed and there are no new changes. Failing this run to preserve status."
            exit 1
          fi
          echo "Previous nightly succeeded (or unknown). Skipping build."
          exit 0

      - name: Setup Flutter
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'
          cache: true

      - name: Install yq
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Compute nightly build metadata
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        id: meta
        run: |
          BRANCH="main"
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y%m%d")
          RUN_NUMBER=${GITHUB_RUN_NUMBER}
          # Nightly tag is unique per run to avoid collisions between manual and scheduled runs
          TAG="nightly-${DATE}-${SHORT_SHA}-r${RUN_NUMBER}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "build_name=$TAG" >> $GITHUB_OUTPUT

      - name: Update versions in pubspec.yamls (nightly)
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          VERSION="0.0.0-${{ steps.meta.outputs.build_name }}"
          yq -i ".version = \"$VERSION\"" pubspec.yaml
          yq -i ".version = \"$VERSION\"" app_fdroid/pubspec.yaml
          yq -i ".version = \"$VERSION\"" app_playstore/pubspec.yaml
          echo "Updated all pubspec.yamls to nightly version $VERSION"

      - name: Customize app name and package ID for nightly builds
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          # Update F-Droid app name and package ID
          sed -i 's/resValue("string", "app_name", "Repertoire")/resValue("string", "app_name", "Repertoire Nightly")/g' app_fdroid/android/app/build.gradle.kts
          sed -i 's/applicationId = "io.github.adithya_jayan.myrepertoirapp.fdroid"/applicationId = "io.github.adithya_jayan.myrepertoirapp.fdroid.nightly"/g' app_fdroid/android/app/build.gradle.kts
          
          # Update Play Store app name and package ID
          sed -i 's/resValue("string", "app_name", "Repertoire")/resValue("string", "app_name", "Repertoire Nightly")/g' app_playstore/android/app/build.gradle.kts
          sed -i 's/applicationId = "io.github.adithya_jayan.myrepertoirapp.playstore"/applicationId = "io.github.adithya_jayan.myrepertoirapp.playstore.nightly"/g' app_playstore/android/app/build.gradle.kts

      - name: Decode Keystore
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          mkdir -p app_fdroid/android app_playstore/android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app_fdroid/android/my-release-key.jks
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app_playstore/android/my-release-key.jks

      - name: Create key.properties
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          echo "storeFile=../my-release-key.jks" > app_fdroid/android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app_fdroid/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app_fdroid/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app_fdroid/android/key.properties
          echo "storeFile=../my-release-key.jks" > app_playstore/android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app_playstore/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app_playstore/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app_playstore/android/key.properties

      - name: Build Nightly Artifacts
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          BUILD_NAME="${{ steps.meta.outputs.build_name }}"
          
          cd app_fdroid
          flutter pub get
          flutter build apk --release --build-name="$BUILD_NAME"
          flutter build appbundle --release --build-name="$BUILD_NAME"
          flutter build web --release --build-name="$BUILD_NAME"
          cd ..

          cd app_playstore
          flutter pub get
          flutter build apk --release --build-name="$BUILD_NAME"
          flutter build appbundle --release --build-name="$BUILD_NAME"
          cd ..

      - name: Verify APK Signature
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          APKSIGNER_PATH=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -r | head -n 1)
          $APKSIGNER_PATH verify --print-certs app_fdroid/build/app/outputs/flutter-apk/app-release.apk
          $APKSIGNER_PATH verify --print-certs app_playstore/build/app/outputs/flutter-apk/app-release.apk

      - name: Package Nightly Assets
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          mkdir -p nightly_assets
          cp app_fdroid/build/app/outputs/flutter-apk/app-release.apk nightly_assets/app-fdroid-nightly.apk
          cp app_fdroid/build/app/outputs/bundle/release/app-release.aab nightly_assets/app-fdroid-nightly.aab
          cp app_playstore/build/app/outputs/flutter-apk/app-release.apk nightly_assets/app-playstore-nightly.apk
          cp app_playstore/build/app/outputs/bundle/release/app-release.aab nightly_assets/app-playstore-nightly.aab
          cp -r app_fdroid/build/web nightly_assets/web_build
          cd nightly_assets
          zip -r web_build.zip web_build/
          cd ..

      - name: Generate Nightly Checksums
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          cd nightly_assets
          for file in *.apk *.aab; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done
          cd ..
          
      - name: Setup SSH Key
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Create/Update rolling Nightly release
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Create or update a rolling release named "nightly" and tag "nightly"
          if gh release view nightly >/dev/null 2>&1; then
            gh release delete nightly -y || true
          fi
          # Recreate the nightly release pointing to the default branch HEAD
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -f nightly
          git push -f origin nightly
          gh release create nightly \
            --title "Nightly Build" \
            --notes "Automated nightly build. Tag: ${{ steps.meta.outputs.tag }}" \
            --prerelease \
            --target main \
            nightly_assets/app-playstore-nightly.apk \
            nightly_assets/app-playstore-nightly.apk.sha256 \
            nightly_assets/app-playstore-nightly.aab \
            nightly_assets/app-playstore-nightly.aab.sha256 \
            nightly_assets/app-fdroid-nightly.apk \
            nightly_assets/app-fdroid-nightly.apk.sha256 \
            nightly_assets/app-fdroid-nightly.aab \
            nightly_assets/app-fdroid-nightly.aab.sha256 \
            nightly_assets/web_build.zip

      - name: Add immutable nightly tag for traceability
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Immutable nightly tag ${TAG_NAME} already exists. Skipping creation."
          else
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git tag -a "${TAG_NAME}" -m "Nightly build ${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi

      - name: Cleanup old nightly tags
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: |
          # Calculate cutoff date (30 days ago)
          CUTOFF_DATE=$(date -d "30 days ago" +%Y-%m-%d)
          echo "Cleaning up nightly tags older than $CUTOFF_DATE"
          
          # List tags matching 'nightly-*', filter by date, and delete
          git fetch --tags
          git tag --list 'nightly-*' --sort=creatordate --format='%(refname:short) %(creatordate:short)' | while read tag date; do
            if [[ "$date" < "$CUTOFF_DATE" ]]; then
              echo "Deleting old tag: $tag ($date)"
              git push --delete origin "$tag" || true
              git tag -d "$tag" || true
            fi
          done

      - name: Success message
        if: steps.changes.outputs.has_changes == 'true' || github.event_name != 'schedule'
        run: echo "Nightly build ${{ steps.meta.outputs.tag }} published."