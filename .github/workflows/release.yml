name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type to create'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - stabilize
      prerelease:
        description: 'Mark as prerelease? (Creates an incremental prerelease version for next patch/minor/major version)'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Release notes (optional, use \n for newlines)'
        required: false
        type: string
        default: ''
      use_release_file:
        description: 'Use release notes from RELEASE_NOTES.md?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      final_version_string: ${{ steps.final_version.outputs.final_version_string }}
      build_number: ${{ steps.final_version.outputs.build_number }}
      version_name: ${{ steps.version_calc.outputs.VERSION_NAME }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'
          cache: true

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get latest version tag
        id: get_latest_tag
        run: |
          git fetch --tags
          LATEST_OFFICIAL_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-\w*\.?\d*)?(\+[0-9]+)?$' | head -n1)
          echo "latest_tag=$LATEST_OFFICIAL_TAG" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: version_calc
        run: |
          # Get current full version from pubspec.yaml (e.g., "3.1.4+1")
          CURRENT_FULL_VERSION=$(yq '.version' pubspec.yaml)
          # Extract semantic version part (e.g., "3.1.4")
          CURRENT_SEMANTIC_VERSION=$(echo "$CURRENT_FULL_VERSION" | cut -d'+' -f1)
          # Strip any prerelease identifiers to get a clean base version
          CURRENT_SEMANTIC_VERSION=$(echo "$CURRENT_SEMANTIC_VERSION" | sed 's/-.*//')
          # Extract build number part (e.g., "1")
          CURRENT_BUILD_NUMBER=$(echo "$CURRENT_FULL_VERSION" | cut -d'+' -f2)
          
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          PRERELEASE="${{ github.event.inputs.prerelease }}"
          
          bump_version() {
            local version=$1
            local type=$2
            IFS='.' read -r MAJOR MINOR PATCH <<< "$version"
            case $type in
              major)
                MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor)
                MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch)
                PATCH=$((PATCH + 1)) ;;
            esac
            echo "$MAJOR.$MINOR.$PATCH"
          }
          
          if [ "$PRERELEASE" = "true" ]; then
            if [ "$RELEASE_TYPE" = "stabilize" ]; then
              BASE_VERSION="$CURRENT_SEMANTIC_VERSION"
            else
              BASE_VERSION=$(bump_version "$CURRENT_SEMANTIC_VERSION" "$RELEASE_TYPE")
            fi
            EXISTING_PRERELEASE=$(git tag --list "v${BASE_VERSION}-prerelease.*" | grep -E "^v${BASE_VERSION}-prerelease\.[0-9]+" | sort -V | tail -n1)
            if [ -n "$EXISTING_PRERELEASE" ]; then
              PRERELEASE_NUM=$(echo "$EXISTING_PRERELEASE" | sed -E 's/.*-prerelease\.([0-9]+)(\+.*)?$/\1/')
              PRERELEASE_NUM=$((PRERELEASE_NUM + 1))
            else
              PRERELEASE_NUM=1
            fi
            NEW_VERSION_NAME="$BASE_VERSION-prerelease.$PRERELEASE_NUM"
          else
            if [ "$RELEASE_TYPE" = "stabilize" ]; then
              NEW_VERSION_NAME="$CURRENT_SEMANTIC_VERSION"
            else
              NEW_VERSION_NAME=$(bump_version "$CURRENT_SEMANTIC_VERSION" "$RELEASE_TYPE")
            fi
          fi
          
          NEW_BUILD_NUMBER=$((CURRENT_BUILD_NUMBER + 1))
          
          echo "VERSION_NAME=${NEW_VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=${NEW_BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "CURRENT_VERSION=${CURRENT_SEMANTIC_VERSION}" >> $GITHUB_OUTPUT
          echo "RELEASE_TYPE=${RELEASE_TYPE}" >> $GITHUB_OUTPUT

      - name: Determine Final Version String
        id: final_version
        run: |
          VERSION_NAME="${{ steps.version_calc.outputs.VERSION_NAME }}"
          BUILD_NUMBER="${{ steps.version_calc.outputs.BUILD_NUMBER }}"
          FINAL_VERSION_STRING="${VERSION_NAME}+${BUILD_NUMBER}"
          echo "final_version_string=$FINAL_VERSION_STRING" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Update version in pubspec.yaml
        run: |
          FINAL_VERSION_STRING="${{ steps.final_version.outputs.final_version_string }}"
          yq -i ".version = \"$FINAL_VERSION_STRING\"" pubspec.yaml
          yq -i ".version = \"$FINAL_VERSION_STRING\"" app_fdroid/pubspec.yaml
          yq -i ".version = \"$FINAL_VERSION_STRING\"" app_playstore/pubspec.yaml
          echo "Updated pubspec.yamls to version $FINAL_VERSION_STRING"

      - name: Format Release Notes
        id: format_notes
        env:
          USER_NOTES: ${{ github.event.inputs.release_notes }}
          USE_RELEASE_FILE: ${{ github.event.inputs.use_release_file }}
        run: |
          # Parse literal \n into actual newlines
          FORMATTED_USER_NOTES=$(echo -e "${USER_NOTES//\\n/\\n}")
          
          # Read from RELEASE_NOTES.md if enabled and exists
          FILE_NOTES=""
          if [ "$USE_RELEASE_FILE" = "true" ] && [ -f RELEASE_NOTES.md ]; then
            FILE_NOTES=$(cat RELEASE_NOTES.md)
            # Empty the release notes file to prevent stale notes in future runs
            > RELEASE_NOTES.md
            echo "Cleared RELEASE_NOTES.md"
          fi
          
          # Combine user notes (from text input) and file notes
          COMBINED_NOTES=""
          if [ -n "$FORMATTED_USER_NOTES" ] && [ -n "$FILE_NOTES" ]; then
            COMBINED_NOTES="$FORMATTED_USER_NOTES"$'\n\n'"$FILE_NOTES"
          elif [ -n "$FORMATTED_USER_NOTES" ]; then
            COMBINED_NOTES="$FORMATTED_USER_NOTES"
          else
            COMBINED_NOTES="$FILE_NOTES"
          fi
          
          echo "formatted_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$COMBINED_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: generate_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          TARGET_COMMITISH="${{ github.ref_name }}"
          TAG_NAME="v${{ steps.final_version.outputs.final_version_string }}"
          
          echo "Generating notes for $TAG_NAME (previous: $PREVIOUS_TAG)"
          
          # Construct JSON payload
          if [ -n "$PREVIOUS_TAG" ]; then
            JSON_PAYLOAD=$(jq -n \
              --arg tag "$TAG_NAME" \
              --arg target "$TARGET_COMMITISH" \
              --arg prev "$PREVIOUS_TAG" \
              '{tag_name: $tag, target_commitish: $target, previous_tag_name: $prev}')
          else
             JSON_PAYLOAD=$(jq -n \
              --arg tag "$TAG_NAME" \
              --arg target "$TARGET_COMMITISH" \
              '{tag_name: $tag, target_commitish: $target}')
          fi

          # Fetch generated notes
          NOTES=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/generate-notes \
            --input - <<< "$JSON_PAYLOAD" | jq -r .body)
          
          # Output multiline string
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create F-Droid Changelog
        env:
          USER_NOTES: ${{ steps.format_notes.outputs.formatted_notes }}
        run: |
          VERSION_CODE="${{ steps.final_version.outputs.build_number }}"
          
          # If manual notes are provided, write them. Otherwise, leave it empty to prevent stale commit notes.
          mkdir -p fastlane/metadata/android/en-US/changelogs
          if [ -n "$USER_NOTES" ]; then
            echo "$USER_NOTES" > "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
            echo "Wrote manual changelog to Fastlane"
          else
            touch "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
            echo "Left Fastlane changelog empty (no manual notes provided)"
          fi

      - name: Decode Keystore
        run: |
          mkdir -p app_fdroid/android app_playstore/android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app_fdroid/android/my-release-key.jks
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app_playstore/android/my-release-key.jks

      - name: Create key.properties
        run: |
          echo "storeFile=../my-release-key.jks" > app_fdroid/android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app_fdroid/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app_fdroid/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app_fdroid/android/key.properties
          echo "storeFile=../my-release-key.jks" > app_playstore/android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app_playstore/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app_playstore/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app_playstore/android/key.properties

      - name: Install dependencies
        run: |
          flutter pub get
          cd app_fdroid && flutter pub get
          cd ../app_playstore && flutter pub get

      - name: Build All Platforms
        run: |
          BUILD_NAME="${{ steps.version_calc.outputs.VERSION_NAME }}"
          BUILD_NUMBER="${{ steps.final_version.outputs.build_number }}"
          
          # --- F-Droid Builds ---
          cd app_fdroid
          echo "Building Universal APK (F-Droid)"
          flutter build apk --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

          echo "Building App Bundle (F-Droid)"
          flutter build appbundle --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          
          echo "Building Web"
          flutter build web --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          cd ..
          
          # --- Play Store Builds ---
          cd app_playstore
          echo "Building Universal APK (Play Store)"
          flutter build apk --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

          echo "Building App Bundle (Play Store)"
          flutter build appbundle --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          cd ..

      - name: Verify APK Versions
        run: |
          AAPT2_PATH=$(find $ANDROID_SDK_ROOT/build-tools -name "aapt2" | sort -r | head -n 1)
          if [ -z "$AAPT2_PATH" ]; then
            echo "aapt2 not found!"
            exit 1
          fi
          # Expected values
          EXPECTED_BUILD_NAME="${{ steps.version_calc.outputs.VERSION_NAME }}"
          BUILD_NUMBER="${{ steps.final_version.outputs.build_number }}"
          
          # --- Verify F-Droid Universal ---
          APK_PATH_FDROID="app_fdroid/build/app/outputs/flutter-apk/app-release.apk"
          echo "Verifying $APK_PATH_FDROID"
          ACTUAL_VERSION_NAME=$($AAPT2_PATH dump badging "$APK_PATH_FDROID" | grep "versionName" | sed "s/.*versionName='\([^']*\)'.*/\1/")
          ACTUAL_VERSION_CODE=$($AAPT2_PATH dump badging "$APK_PATH_FDROID" | grep "versionCode" | sed "s/.*versionCode='\([^']*\)'.*/\1/")
          echo "Expected Version Name: $EXPECTED_BUILD_NAME, Actual: $ACTUAL_VERSION_NAME"
          echo "Expected Version Code: $BUILD_NUMBER, Actual: $ACTUAL_VERSION_CODE"
          if [ "$ACTUAL_VERSION_NAME" != "$EXPECTED_BUILD_NAME" ] || [ "$ACTUAL_VERSION_CODE" != "$BUILD_NUMBER" ]; then
            echo "Version mismatch for F-Droid Universal!"
            exit 1
          fi
          
          # --- Verify Play Store Universal ---
          APK_PATH_UNIVERSAL="app_playstore/build/app/outputs/flutter-apk/app-release.apk"
          echo "Verifying $APK_PATH_UNIVERSAL"
          ACTUAL_VERSION_NAME=$($AAPT2_PATH dump badging "$APK_PATH_UNIVERSAL" | grep "versionName" | sed "s/.*versionName='\([^']*\)'.*/\1/")
          ACTUAL_VERSION_CODE=$($AAPT2_PATH dump badging "$APK_PATH_UNIVERSAL" | grep "versionCode" | sed "s/.*versionCode='\([^']*\)'.*/\1/")
          echo "Expected Version Name: $EXPECTED_BUILD_NAME, Actual: $ACTUAL_VERSION_NAME"
          echo "Expected Version Code: $BUILD_NUMBER, Actual: $ACTUAL_VERSION_CODE"
          if [ "$ACTUAL_VERSION_NAME" != "$EXPECTED_BUILD_NAME" ] || [ "$ACTUAL_VERSION_CODE" != "$BUILD_NUMBER" ]; then
            echo "Version mismatch for Play Store Universal!"
            exit 1
          fi

          echo "All APK versions verified successfully."

      - name: Verify Signatures
        run: |
          APKSIGNER_PATH=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -r | head -n 1)
          
          # Verify F-Droid
          echo "Verifying F-Droid APK"
          $APKSIGNER_PATH verify --print-certs app_fdroid/build/app/outputs/flutter-apk/app-release.apk
          echo "Verifying App Bundle (F-Droid)"
          jarsigner -verify -certs app_fdroid/build/app/outputs/bundle/release/app-release.aab
          
          # Verify Play Store
          echo "Verifying Play Store APK"
          $APKSIGNER_PATH verify --print-certs app_playstore/build/app/outputs/flutter-apk/app-release.apk
          echo "Verifying App Bundle (Play Store)"
          jarsigner -verify -certs app_playstore/build/app/outputs/bundle/release/app-release.aab

      - name: Create Release Assets
        run: |
          mkdir -p release_assets
          # F-Droid
          cp app_fdroid/build/app/outputs/flutter-apk/app-release.apk release_assets/app-universal-fdroid-release.apk
          cp app_fdroid/build/app/outputs/bundle/release/app-release.aab release_assets/app-fdroid-release.aab
          
          # Play Store
          cp app_playstore/build/app/outputs/flutter-apk/app-release.apk release_assets/app-universal-playstore-release.apk
          cp app_playstore/build/app/outputs/bundle/release/app-release.aab release_assets/app-playstore-release.aab

          # Web
          cp -r app_fdroid/build/web release_assets/web_build
          cd release_assets
          zip -r web_build.zip web_build/
          cd ..

      - name: Generate Checksums
        run: |
          cd release_assets
          for file in *.apk *.aab; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done
          cd ..
      
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Create Git Tag and Push Changes
        run: |
          TAG_NAME="v${{ steps.final_version.outputs.final_version_string }}"
          VERSION_CODE="${{ steps.final_version.outputs.build_number }}"
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add pubspec.yamls, lockfiles, the new changelog file, and RELEASE_NOTES.md (if it exists)
          git add pubspec.yaml pubspec.lock app_fdroid/pubspec.yaml app_playstore/pubspec.yaml "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          git add -f pubspec.lock app_fdroid/pubspec.lock app_playstore/pubspec.lock
          if [ -f RELEASE_NOTES.md ]; then
            git add RELEASE_NOTES.md
          fi
          
          COMMIT_MSG="Release version $TAG_NAME"
          git commit -m "$COMMIT_MSG"
          git tag -a "$TAG_NAME" -m "$COMMIT_MSG"
          git push origin ${{ github.ref_name }}
          git push origin "$TAG_NAME"

      - name: Get Build Date
        id: get_build_date
        run: |
          echo "build_date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.final_version.outputs.final_version_string }}
          body: |
            ${{ steps.format_notes.outputs.formatted_notes }}

            <details>
            <summary>Release Details</summary>
            
            **Release Type:** ${{ steps.version_calc.outputs.RELEASE_TYPE }}
            **Version Name:** ${{ steps.version_calc.outputs.VERSION_NAME }}
            **Build Number:** ${{ steps.final_version.outputs.build_number }}
            **Previous Version:** ${{ steps.version_calc.outputs.CURRENT_VERSION }}
            
            ### Build Information
            - Flutter Version: 3.38.4
            - Build Date: ${{ steps.get_build_date.outputs.build_date }}
            </details>

            **Changes:**
            ${{ steps.generate_notes.outputs.notes }}

            ---
            ### File Guide (What should I download?)
            
            - **Android Users (Play Store / Proprietary):**
              - `app-universal-playstore-release.apk` (Universal APK for all devices)
            - **Android Users (F-Droid / Open Source):**
              - `app-universal-fdroid-release.apk` (Universal APK for all devices)
            - **Web Users:**
              - `web_build.zip` (For hosting on a web server)
            - **Windows Users:**
              - `repertoire-windows-v...zip` (Extract and run `repertoire.exe`)
            - **Linux Users:**
              - `repertoire-linux-v...zip` (Extract and run `./repertoire`)
          files: |
            ./release_assets/app-universal-playstore-release.apk
            ./release_assets/app-universal-playstore-release.apk.sha256
            ./release_assets/app-playstore-release.aab
            ./release_assets/app-playstore-release.aab.sha256
            ./release_assets/app-universal-fdroid-release.apk
            ./release_assets/app-universal-fdroid-release.apk.sha256
            ./release_assets/app-fdroid-release.aab
            ./release_assets/app-fdroid-release.aab.sha256
            ./release_assets/web_build.zip
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}

      - name: Success Message
        run: |
          FINAL_VERSION_STRING="${{ steps.final_version.outputs.final_version_string }}"
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            echo "🎉 Successfully created prerelease v${FINAL_VERSION_STRING}!"
            echo "📱 Android APK and App Bundle created"
            echo "🌐 Web build created"
            echo "🏷️  Git tag v${FINAL_VERSION_STRING} created"
            echo "📦 Prerelease GitHub release created"
          else
            echo "🎉 Successfully released version v${FINAL_VERSION_STRING}!"
            echo "📱 Android APK and App Bundle created"
            echo "🌐 Web build created"
            echo "🏷️  Git tag v${FINAL_VERSION_STRING} created"
            echo "📦 Official GitHub release created"
          fi

  build-desktop:
    needs: release
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
            build_cmd: flutter build windows --release
            asset_path: app_fdroid/build/windows/x64/runner/Release
            zip_name: repertoire-windows
          - os: ubuntu-latest
            target: linux
            build_cmd: flutter build linux --release
            asset_path: app_fdroid/build/linux/x64/release/bundle
            zip_name: repertoire-linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.final_version_string }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.4"
          channel: 'stable'
          cache: true
      
      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install dependencies
        run: cd app_fdroid && flutter pub get

      - name: Pre-download and extract MDK SDK (Windows)
        if: matrix.target == 'windows'
        shell: bash
        run: |
          curl -L -o mdk-sdk.7z https://sourceforge.net/projects/mdk-sdk/files/nightly/mdk-sdk-windows-x64.7z
          7z x mdk-sdk.7z -oapp_fdroid/windows/flutter/ephemeral/.plugin_symlinks/fvp/windows/ -aoa

      - name: Build Desktop App
        run: cd app_fdroid && ${{ matrix.build_cmd }} --build-name="${{ needs.release.outputs.version_name }}" --build-number="${{ needs.release.outputs.build_number }}"

      - name: Zip Release
        shell: bash
        run: |
          # Create a temporary staging directory with the versioned name
          STAGING_DIR="${{ matrix.zip_name }}-v${{ needs.release.outputs.final_version_string }}"
          mkdir -p "$STAGING_DIR"
          
          # Copy contents to staging
          cp -r ${{ matrix.asset_path }}/* "$STAGING_DIR/"
          
          # Zip the staging directory
          if [ "${{ matrix.target }}" == "windows" ]; then
             powershell "Compress-Archive -Path $STAGING_DIR -DestinationPath ${STAGING_DIR}.zip"
          else
             zip -r "${STAGING_DIR}.zip" "$STAGING_DIR"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.final_version_string }}
          files: ${{ matrix.zip_name }}-v${{ needs.release.outputs.final_version_string }}.zip
